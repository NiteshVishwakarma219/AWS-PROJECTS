<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📚 School ERP</h2>
    <ul>
      <li>Dashboard</li>
      <li>Add Student</li>
      <li>View Students</li>
    </ul>
  </div>
  <!-- Main Content -->
  <div class="main">
    <div class="topbar">
      <h1>Student Dashboard</h1>
    </div>
    <!-- Cards -->
    <div class="cards">
      <div class="card">Total Students</div>
      <div class="card">Active Courses</div>
      <div class="card">Departments</div>
    </div>
    <!-- Form -->
    <div class="form">
      <h3>Add Student</h3>
      <input id="StudentID" placeholder="Student ID">
      <input id="FullName" placeholder="Full Name">
      <input id="Email" placeholder="Email">
      <input id="Course" placeholder="Course">
      <input id="City" placeholder="City">
      <button onclick="addStudent()">Add Student</button>
    </div>
    <!-- Table -->
    <div class="table">
      <h3>Student Records</h3>
      <div id="students"></div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
