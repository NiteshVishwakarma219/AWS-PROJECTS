<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AWS ELB Demo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f8ff;
            margin-top: 100px;
        }
        .box {
            display: inline-block;
            padding: 30px;
            border-radius: 10px;
            background: #ffffff;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        .server {
            font-size: 24px;
            color: #27ae60;
            margin-top: 10px;
        }
        .note {
            color: #7f8c8d;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>☁️ AWS Elastic Load Balancer Demo</h1>
    <div class="server">
        Server Running Successfully 🚀
    </div>
    <div class="note">
        This response is served from an EC2 instance behind ELB
    </div>
</div>

</body>
</html>
